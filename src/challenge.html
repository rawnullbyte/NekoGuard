<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just a moment</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f8f6;
      --text: #1a1a1a;
      --muted: #8a8a8a;
      --border: #e2e0db;
      --accent: #1a1a1a;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0a0a0a;
        --text: #f0f0f0;
        --muted: #777777;
        --border: #222222;
        --accent: #f0f0f0;
      }
    }

    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .wrap {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    .header {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .eyebrow {
      font-family: ui-monospace, 'SFMono-Regular', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      font-size: 2rem;
      font-weight: normal;
      line-height: 1.3;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .label {
      font-family: ui-monospace, 'SFMono-Regular', monospace;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .value {
      font-family: ui-monospace, 'SFMono-Regular', monospace;
      font-size: 0.95rem;
      color: var(--text);
    }

    .progress-track {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .body-text {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
    }

    .footer a {
      font-family: ui-monospace, 'SFMono-Regular', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.05em;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .footer a:hover { opacity: 1; }
  </style>
</head>
<body>

  <div class="wrap" id="ng" data-challenge="{{CHALLENGE}}" data-bits="{{BITS}}">

    <div class="header">
      <span class="eyebrow">Security check</span>
      <h1>One moment please.</h1>
    </div>

    <div style="display: flex; flex-direction: column; gap: 1rem;">
      <div class="status-row">
        <span class="label">difficulty</span>
        <span class="value" id="diff-val">-- bits</span>
      </div>
      <div class="status-row">
        <span class="label">nonce</span>
        <span class="value" id="nonce-val">0</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress"></div>
      </div>
    </div>

    <p class="body-text" id="status-text">Verifying your connection. This only takes a moment.</p>

  </div>

  <div class="footer">
    <a href="https://github.com/rawnullbyte/NekoGuard" target="_blank">NekoGuard v<span id="app-version"></span></a>
  </div>

  <script>
    (async () => {
      fetch("/__ng/version")
        .then(r => r.text())
        .then(v => document.getElementById("app-version").textContent = v)
        .catch(() => {});

      const cfg       = document.getElementById("ng").dataset;
      const challenge = cfg.challenge;
      const bits      = parseInt(cfg.bits, 10) || 16;
      const enc       = new TextEncoder();

      const nonceEl    = document.getElementById("nonce-val");
      const diffEl     = document.getElementById("diff-val");
      const progressEl = document.getElementById("progress");
      const statusEl   = document.getElementById("status-text");

      diffEl.textContent = bits + " bits";

      const maxNonce = Math.pow(2, bits) * 1.5;

      async function sha256hex(s) {
        const buf = await crypto.subtle.digest("SHA-256", enc.encode(s));
        return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
      }

      function meetsTarget(hash, bits) {
        const full = Math.floor(bits / 4);
        const rem  = bits % 4;
        if (!hash.startsWith("0".repeat(full))) return false;
        if (rem === 0) return true;
        return parseInt(hash[full], 16) < (1 << (4 - rem));
      }

      let nonce = 0;

      while (true) {
        if (nonce % 500 === 0) {
          nonceEl.textContent = nonce.toLocaleString();
          progressEl.style.width = Math.min((nonce / maxNonce) * 100, 95) + "%";
          await new Promise(r => setTimeout(r, 0));
        }

        const hash = await sha256hex(challenge + nonce);

        if (meetsTarget(hash, bits)) {
          nonceEl.textContent = nonce.toLocaleString();
          progressEl.style.width = "100%";
          statusEl.textContent = "Verified. Redirecting…";

          const res = await fetch("/__ng/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ challenge, nonce: String(nonce) }),
          });

          if (res.ok) location.reload();
          else statusEl.textContent = "Verification failed. Please refresh the page.";
          return;
        }

        nonce++;
      }
    })();
  </script>
</body>
</html>
